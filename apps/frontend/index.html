<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Soup.net</title>
    <meta name="description" content="Your taste and judgment, in every AI agent you use. You make the calls. Your AI agents capture them as they work, then bring them back in your next session, on a different tool, or to a collaborator joining the project. The recipe book builds itself." />
    <!-- Social preview cards (Open Graph + Twitter). Crawlers read the static
         HTML and never run JS, so these live here rather than in the SPA.
         og:image/og:url must be absolute; the SITE_URL placeholder is replaced
         at build time from FRONTEND_URL (see vite.config.ts), defaulting to
         https://soup.net. -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Soup.net" />
    <meta property="og:title" content="Soup.net — your taste and judgment, in every AI agent you use" />
    <meta property="og:description" content="You make the calls. Your AI agents capture them as they work, then bring them back in your next session, on a different tool, or to a collaborator joining the project. The recipe book builds itself." />
    <meta property="og:url" content="%SITE_URL%/" />
    <meta property="og:image" content="%SITE_URL%/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Soup.net — a person works at a table among glowing AI agent figures, connected by threads of shared taste and judgment" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Soup.net — your taste and judgment, in every AI agent you use" />
    <meta name="twitter:description" content="You make the calls. Your AI agents capture them as they work, then bring them back in your next session, on a different tool, or to a collaborator joining the project. The recipe book builds itself." />
    <meta name="twitter:image" content="%SITE_URL%/og-image.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/src/assets/favicon-192x192.png" />
    <link rel="apple-touch-icon" sizes="192x192" href="/src/assets/favicon-192x192.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Epilogue:wght@400;500;600;700;800&family=Newsreader:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
