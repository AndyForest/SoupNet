services:
  postgres:
    image: pgvector/pgvector:pg17
    restart: unless-stopped
    environment:
      POSTGRES_USER: claimnet
      POSTGRES_PASSWORD: claimnet
      POSTGRES_DB: claimnet
    ports:
      - "5633:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U claimnet"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
      args:
        # Build the LOCAL-capable image (installs @huggingface/transformers +
        # onnxruntime-node, bakes the default model) so self-hosters using
        # `docker compose` can run EMBEDDINGS_PROVIDER=local out of the box. The
        # hosted deploy builds via `docker build` with no args → lean image.
        EMBEDDINGS_LOCAL: "true"
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      # Override host/port from .env with Docker-internal values
      PGHOST: postgres
      PGPORT: "5432"
      # Backend listens on 3001 inside the container; docker maps host:3101 → container:3001.
      # The non-docker code default is 3101 (matches host port) — this override keeps the
      # container internal port stable so the docker mapping doesn't have to change.
      PORT: "3001"
      NODE_ENV: production
      JWT_SECRET: ${JWT_SECRET:-change-me-to-a-random-64-char-hex-string-use-openssl-rand-hex-32}
      DEV_USERNAME: ${DEV_USERNAME:-}
      DEV_PASSWORD: ${DEV_PASSWORD:-}
      TEST_USERNAME: ${TEST_USERNAME:-}
      TEST_PASSWORD: ${TEST_PASSWORD:-}
      ALLOW_AUTO_SETUP: "true"  # Docker dev env — allow auto-setup despite NODE_ENV=production
      DISABLE_RATE_LIMIT: "true"  # Dev env — tests make many rapid requests (matches CI)
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      # Embedding provider — "gemini" (real API), "stub" (deterministic fake
      # vectors for tests, no quota cost), "local" (in-process CPU model, no key),
      # or "openai-compatible" (any /v1/embeddings endpoint).
      EMBEDDINGS_PROVIDER: ${EMBEDDINGS_PROVIDER:-gemini}
      # Model id — "local" model (default baked in the image) or the model id the
      # openai-compatible endpoint reports. Empty falls back to the provider default.
      EMBEDDINGS_MODEL: ${EMBEDDINGS_MODEL:-}
      # openai-compatible only: base URL of the /v1/embeddings endpoint (e.g.
      # llama.cpp http://host.docker.internal:8080/v1) and an optional bearer key.
      # Note: localhost inside this container is the container, not the host —
      # use host.docker.internal (Docker Desktop) or the host IP for a harness on
      # the host. To swap a baked "local" model without rebuilding, mount an
      # HF_HOME volume here and unset HF_HUB_OFFLINE/TRANSFORMERS_OFFLINE.
      EMBEDDINGS_BASE_URL: ${EMBEDDINGS_BASE_URL:-}
      EMBEDDINGS_API_KEY: ${EMBEDDINGS_API_KEY:-}
      # Synthesis provider for the premium `synthesize` feature — "gemini"
      # (real LLM call via SYNTHESIS_MODEL) or "stub" (deterministic profile,
      # no LLM call). Reuses GEMINI_API_KEY.
      SYNTHESIS_PROVIDER: ${SYNTHESIS_PROVIDER:-gemini}
      SYNTHESIS_MODEL: ${SYNTHESIS_MODEL:-gemini-3.5-flash}
      # Async embedding pipeline (pg-boss consumers) runs in-process. Set to
      # "false" to disable and run HTTP-only. See ADR-0020.
      EMBEDDING_WORKER_ENABLED: ${EMBEDDING_WORKER_ENABLED:-true}
      WORKER_CONCURRENCY: ${WORKER_CONCURRENCY:-5}
      # Email — Mailpit in dev, AWS SES in production
      SMTP_HOST: mailpit
      SMTP_PORT: "1025"
      EMAIL_FROM: noreply@soup.net
    ports:
      - "3101:3001"   # host:container — backend listens on 3001 inside; reachable on 3101 from host
    volumes:
      - ./uploads:/app/apps/backend/uploads  # persist uploaded artifacts across restarts

  # Local email testing — catches all outbound email from the backend.
  # Web UI: http://localhost:8625   SMTP: mailpit:1025 (from backend container)
  # Production uses AWS SES instead.
  mailpit:
    image: axllent/mailpit:latest
    restart: unless-stopped
    ports:
      - "8625:8025"   # Web UI
      - "1125:1025"   # SMTP (host-side; container internal stays 1025)
    environment:
      MP_SMTP_AUTH_ACCEPT_ANY: 1
      MP_SMTP_AUTH_ALLOW_INSECURE: 1

volumes:
  postgres_data:
