# CI-like test environment — fresh postgres on host port 5534 (default), no dev data.
#
# Usage:
#   docker compose -f docker-compose.ci.yml up -d
#   npm run test:ci     (or: BACKEND_URL=http://localhost:3098 npx vitest run)
#   docker compose -f docker-compose.ci.yml down -v
#
# Parallel gates: the host port interpolates from TESTCI_PGPORT (default 5534)
# so concurrent sessions on one machine can each run `npm run test:ci` against
# their own stack — scripts/test-ci-local.mjs sets the env var and a matching
# port-derived compose project name (soupnet-ci-<port>). See that script's
# header for the full contract.
#
# This spins up a clean postgres separate from your dev database (port 5633).
# Useful for:
#   - Reproducing CI failures locally
#   - Testing against an empty database (cold start)
#   - Verifying migrations work from scratch
#   - Testing without Gemini API key (lexical-only fallback)

services:
  postgres-ci:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_USER: claimnet
      POSTGRES_PASSWORD: claimnet
      POSTGRES_DB: claimnet
    ports:
      - "${TESTCI_PGPORT:-5534}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U claimnet"]
      interval: 3s
      timeout: 3s
      retries: 10
